apiVersion: inference.sagemaker.aws.amazon.com/v1alpha1
kind: InferenceEndpointConfig
metadata:
  name: qwen3-4b-instruct-sft-endpoint
  namespace: default
spec:
  modelName: qwen3-4b-instruct-sft
  endpointName: qwen3-4b-instruct-sft-endpoint
  instanceType: ml.g5.12xlarge
  invocationEndpoint: v1/chat/completions
  modelSourceConfig:
    modelSourceType: fsx
    fsxStorage:
      fileSystemId: <your-fsx-filesystem-id>
    modelLocation: shared/option-2-supervised-fine-tuning/model
  worker:
    resources:
      limits:
        nvidia.com/gpu: 4
      requests:
        nvidia.com/gpu: 4
    image: 763104351884.dkr.ecr.us-east-1.amazonaws.com/vllm:server-cuda-v2.1
    modelInvocationPort:
      containerPort: 8080
      name: http
    modelVolumeMount:
      name: model-weights
      mountPath: /opt/ml/model
    # Pass raw vLLM server flags via args (server-cuda image runs the vLLM OpenAI server).
    args:
      - --model
      - /opt/ml/model
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.8"
      - --max-model-len
      - "8192"
      - --max-num-seqs
      - "8"
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --kv-cache-dtype
      - auto
      - --tensor-parallel-size
      - "4"
